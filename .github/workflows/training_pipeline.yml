# .github/workflows/training_pipeline.yml
# Runs the training pipeline every day automatically

name: Training Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2AM UTC
  workflow_dispatch:       # Also allows manual trigger

jobs:
  run-training-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training pipeline
        env:
          AQICN_TOKEN:          ${{ secrets.AQICN_TOKEN }}
          OPENWEATHER_API_KEY:  ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY:    ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:    ${{ secrets.HOPSWORKS_PROJECT }}
          HOPSWORKS_HOST:       ${{ secrets.HOPSWORKS_HOST }}
        run: python pipelines/training_pipeline.py
        